services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    networks:
      - lumu-net

  control-center:
    image: confluentinc/cp-enterprise-control-center-next-gen:2.5.0
    hostname: control-center
    container_name: control-center
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "9021:9021"
    environment:
      - CONTROL_CENTER_BOOTSTRAP_SERVERS=kafka:29092
      - CONTROL_CENTER_REPLICATION_FACTOR=1
      - CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS=1
      - CONTROL_CENTER_MODE_ENABLE=management
      - CONTROL_CENTER_PROMETHEUS_ENABLE=false
      - PORT=9021
    networks:
      - lumu-net

  lumu-incident-handler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumu-incident-handler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VERIFY_SSL=${VERIFY_SSL:-False}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLIENT_ID=${KAFKA_CLIENT_ID:-lumu-incident-handler}
      - KAFKA_DELIVERY_TIMEOUT_SECONDS=${KAFKA_DELIVERY_TIMEOUT_SECONDS:-15}
      - KAFKA_FLUSH_TIMEOUT_SECONDS=${KAFKA_FLUSH_TIMEOUT_SECONDS:-10}
    volumes:
      - lumu-data:/app/data
    networks:
      - lumu-net
    depends_on:
      - kafka

volumes:
  lumu-data:

networks:
  lumu-net:
    driver: bridge
